# ─────────────────────────────────────────────────────────────
#  Конфіг клієнта skin.one — БЕЗ секретів (секрети в .env).
#  Використовується agent/coach/rag/insights через settings.
# ─────────────────────────────────────────────────────────────

client:
  name: "skin.one"                        # назва бізнесу
  niche: "професійна косметика"           # сфера — підставляється у промпти
  timezone: "Europe/Kiev"
  language: "uk"

crm:
  provider: "sitniks"

models:
  analysis: "claude-sonnet-4-6"           # аналіз діалогів
  rag: "claude-sonnet-4-6"                # RAG відповіді / поради
  reply: "claude-sonnet-4-6"              # copilot та автопілот (майбутнє)

schedule:
  daily_report_time: "05:30"

criteria: |
  1. Швидкість відповіді
  2. Тон і ввічливість
  3. Виявлення потреби (тип шкіри / стан волосся)
  4. Експертність (склад, поєднання, доречні рекомендації)
  5. Робота з запереченнями
  6. Закриття на замовлення
  7. Допродаж / комплекс

  Робочий час: 08:00-23:00 Київ.
  Опт/косметолог-перепродаж — коректна відмова = neutral.

managers:
  - name: "Єлизавета"
  - name: "Діана Кириченко 2"
  - name: "Вікторія Тумаш 2"
  - name: "Віка Палатай2"
