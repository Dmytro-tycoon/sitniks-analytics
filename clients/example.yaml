# ─────────────────────────────────────────────────────────────
#  Конфіг клієнта (БЕЗ секретів — секрети в .env).
#  Майстер /setup створює clients/<твоя_назва>.yaml на основі цього.
# ─────────────────────────────────────────────────────────────

client:
  name: "Example Cosmetics"          # назва бізнесу
  niche: "косметика"                 # сфера — підставляється в промпт аналізатора
  timezone: "Europe/Kiev"
  language: "uk"                     # мова звітів і відповідей агента

crm:
  provider: "sitniks"               # sitniks | keycrm | kommo (підключаються як конектори)

models:
  analysis: "claude-haiku-4-5-20251001"   # масова оцінка діалогів — дешево
  rag: "claude-sonnet-4-6"                 # відповіді по базі переписок
  reply: "claude-sonnet-4-6"               # майбутній автопілот: генерація відповідей

schedule:
  daily_report_time: "08:00"        # коли слати ранковий звіт

# Критерії оцінки менеджера (можна редагувати без редеплою — дублюються в БД).
# Це те, що клієнт описує голосом/документом на етапі онбордингу.
criteria: |
  1. Привітання та встановлення контакту
  2. Виявлення потреби клієнта
  3. Презентація товару під потребу
  4. Відпрацювання заперечень
  5. Закриття на замовлення
  6. Тон спілкування (доброзичливість, без грубощів)
  7. Допродаж (upsell / cross-sell)

  Важливо: швидкість відповіді критична. Грубість недопустима.

managers:                            # заповнюється під час онбордингу
  - name: "Anastasiia"
  - name: "Iryna"
